syntax = "proto3";

package sdg.inventory;

// Java config
option java_multiple_files = true;
option java_package = "generated.sdg.inventory";
option java_outer_classname = "InventoryMonitoringProto";


service InventoryMonitoringService {

  // Unary 
  rpc GetInventoryStatus (InventoryRequest) returns (InventoryStatus);

  // Server Streaming 
  rpc StreamExpiryAlerts (ExpiryAlertRequest) returns (stream ExpiryAlert);
}

// MESSAGES

// Request to fetch inventory for a store
message InventoryRequest {
  string store_id = 1;
}

// Full inventory response
message InventoryStatus {
  string store_id = 1;
  repeated InventoryItem items = 2;
  int64 generated_at_epoch_ms = 3;
}

// Inventory item
message InventoryItem {
  string sku = 1;
  string name = 2;
  int32 quantity_units = 3;
  int64 expiry_epoch_ms = 4;
}

// Request for expiry alerts
message ExpiryAlertRequest {
  string store_id = 1;
  int32 horizon_days = 2;
}

// Streaming alert response
message ExpiryAlert {
  string sku = 1;
  int32 days_to_expiry = 2;
  int32 current_quantity_units = 3;
}
